<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#F5E6A3"/>
      <stop offset="30%"  stop-color="#C9A84C"/>
      <stop offset="65%"  stop-color="#E8C96A"/>
      <stop offset="100%" stop-color="#A07830"/>
    </linearGradient>
    <linearGradient id="sb" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#E8E0FF"/>
      <stop offset="50%" stop-color="#B0C4DE"/>
      <stop offset="100%" stop-color="#9575CD"/>
    </linearGradient>
    <linearGradient id="om" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#FF8F00"/>
      <stop offset="100%" stop-color="#BF360C"/>
    </linearGradient>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#130420"/>
      <stop offset="100%" stop-color="#04020E"/>
    </radialGradient>
    <filter id="gl">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="gs">
      <feGaussianBlur stdDeviation="1.8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <path id="p" d="M0,-18 C6,-11 6,0 0,8 C-6,0 -6,-11 0,-18Z"/>
  </defs>

  <!-- BG -->
  <rect width="200" height="200" fill="#06030F" rx="20"/>
  <circle cx="100" cy="100" r="98" fill="url(#bg)"/>

  <g transform="translate(100,100)">

    <!-- glow ring -->
    <circle r="90" fill="none" stroke="#9575CD" stroke-width="0.5" opacity="0.2" filter="url(#gl)"/>
    <!-- dark disk -->
    <circle r="85" fill="url(#bg)"/>
    <!-- outer dashed ring -->
    <circle r="83" fill="none" stroke="url(#g)" stroke-width="1.5" stroke-dasharray="4.5,3"/>
    <!-- second ring -->
    <circle r="76" fill="none" stroke="#9575CD" stroke-width="0.6" opacity="0.4"/>

    <!-- 16 outer petals -->
    <g opacity="0.75">
      <g transform="rotate(0)">   <use href="#p" transform="translate(0,-68) scale(1.1)" fill="none" stroke="url(#g)" stroke-width="0.9"/></g>
      <g transform="rotate(22.5)"><use href="#p" transform="translate(0,-68) scale(1.1)" fill="none" stroke="url(#g)" stroke-width="0.9"/></g>
      <g transform="rotate(45)">  <use href="#p" transform="translate(0,-68) scale(1.1)" fill="none" stroke="url(#g)" stroke-width="0.9"/></g>
      <g transform="rotate(67.5)"><use href="#p" transform="translate(0,-68) scale(1.1)" fill="none" stroke="url(#g)" stroke-width="0.9"/></g>
      <g transform="rotate(90)">  <use href="#p" transform="translate(0,-68) scale(1.1)" fill="none" stroke="url(#g)" stroke-width="0.9"/></g>
      <g transform="rotate(112.5)"><use href="#p" transform="translate(0,-68) scale(1.1)" fill="none" stroke="url(#g)" stroke-width="0.9"/></g>
      <g transform="rotate(135)"> <use href="#p" transform="translate(0,-68) scale(1.1)" fill="none" stroke="url(#g)" stroke-width="0.9"/></g>
      <g transform="rotate(157.5)"><use href="#p" transform="translate(0,-68) scale(1.1)" fill="none" stroke="url(#g)" stroke-width="0.9"/></g>
      <g transform="rotate(180)"> <use href="#p" transform="translate(0,-68) scale(1.1)" fill="none" stroke="url(#g)" stroke-width="0.9"/></g>
      <g transform="rotate(202.5)"><use href="#p" transform="translate(0,-68) scale(1.1)" fill="none" stroke="url(#g)" stroke-width="0.9"/></g>
      <g transform="rotate(225)"> <use href="#p" transform="translate(0,-68) scale(1.1)" fill="none" stroke="url(#g)" stroke-width="0.9"/></g>
      <g transform="rotate(247.5)"><use href="#p" transform="translate(0,-68) scale(1.1)" fill="none" stroke="url(#g)" stroke-width="0.9"/></g>
      <g transform="rotate(270)"> <use href="#p" transform="translate(0,-68) scale(1.1)" fill="none" stroke="url(#g)" stroke-width="0.9"/></g>
      <g transform="rotate(292.5)"><use href="#p" transform="translate(0,-68) scale(1.1)" fill="none" stroke="url(#g)" stroke-width="0.9"/></g>
      <g transform="rotate(315)"> <use href="#p" transform="translate(0,-68) scale(1.1)" fill="none" stroke="url(#g)" stroke-width="0.9"/></g>
      <g transform="rotate(337.5)"><use href="#p" transform="translate(0,-68) scale(1.1)" fill="none" stroke="url(#g)" stroke-width="0.9"/></g>
    </g>

    <!-- 8 inner filled petals -->
    <g transform="rotate(0)">   <use href="#p" transform="translate(0,-50)" fill="#180530" stroke="url(#g)" stroke-width="1.1"/></g>
    <g transform="rotate(45)">  <use href="#p" transform="translate(0,-50)" fill="#180530" stroke="url(#g)" stroke-width="1.1"/></g>
    <g transform="rotate(90)">  <use href="#p" transform="translate(0,-50)" fill="#180530" stroke="url(#g)" stroke-width="1.1"/></g>
    <g transform="rotate(135)"> <use href="#p" transform="translate(0,-50)" fill="#180530" stroke="url(#g)" stroke-width="1.1"/></g>
    <g transform="rotate(180)"> <use href="#p" transform="translate(0,-50)" fill="#180530" stroke="url(#g)" stroke-width="1.1"/></g>
    <g transform="rotate(225)"> <use href="#p" transform="translate(0,-50)" fill="#180530" stroke="url(#g)" stroke-width="1.1"/></g>
    <g transform="rotate(270)"> <use href="#p" transform="translate(0,-50)" fill="#180530" stroke="url(#g)" stroke-width="1.1"/></g>
    <g transform="rotate(315)"> <use href="#p" transform="translate(0,-50)" fill="#180530" stroke="url(#g)" stroke-width="1.1"/></g>

    <!-- षट्कोण -->
    <g opacity="0.4" filter="url(#gs)">
      <polygon points="0,-34 29.4,17 -29.4,17" fill="none" stroke="url(#sb)" stroke-width="1"/>
      <polygon points="0,34 29.4,-17 -29.4,-17" fill="none" stroke="url(#g)" stroke-width="1"/>
    </g>

    <!-- inner circle -->
    <circle r="28" fill="#150430" stroke="url(#g)" stroke-width="1.2"/>

    <!-- OM -->
    <text x="0" y="12" text-anchor="middle" font-family="serif" font-size="38" font-weight="bold"
      fill="url(#om)" filter="url(#gl)">ॐ</text>

    <!-- Crescent moon -->
    <g transform="translate(0,-40) scale(1.3)" opacity="0.95" filter="url(#gs)">
      <path d="M0,-7.5 A7.5,7.5 0 1,1 0,7.5 A4.5,4.5 0 1,0 0,-7.5Z" fill="url(#sb)"/>
    </g>

    <!-- Top trishul -->
    <g transform="translate(0,-61) scale(0.58)" filter="url(#gs)">
      <rect x="-1.5" y="-20" width="3" height="28" fill="url(#g)" rx="0.6"/>
      <path d="M-8,-10 C-8,-19 -3,-20 -3,-15 L-3,2 L-8,2Z" fill="url(#g)"/>
      <path d="M8,-10 C8,-19 3,-20 3,-15 L3,2 L8,2Z" fill="url(#g)"/>
      <ellipse cx="0"  cy="-20" rx="2.5" ry="3" fill="url(#g)"/>
      <ellipse cx="-5.5" cy="-15" rx="1.8" ry="2.2" fill="url(#g)"/>
      <ellipse cx="5.5"  cy="-15" rx="1.8" ry="2.2" fill="url(#g)"/>
      <rect x="-6" y="-6" width="12" height="1.5" fill="url(#g)" rx="0.4"/>
    </g>

    <!-- L/R trishuls -->
    <g transform="translate(-63,0) rotate(-90) scale(0.42)" opacity="0.82" filter="url(#gs)">
      <rect x="-1.5" y="-20" width="3" height="28" fill="url(#g)" rx="0.5"/>
      <path d="M-8,-10 C-8,-19 -3,-20 -3,-15 L-3,2 L-8,2Z" fill="url(#g)"/>
      <path d="M8,-10 C8,-19 3,-20 3,-15 L3,2 L8,2Z" fill="url(#g)"/>
      <ellipse cx="0" cy="-20" rx="2.2" ry="2.8" fill="url(#g)"/>
    </g>
    <g transform="translate(63,0) rotate(90) scale(0.42)" opacity="0.82" filter="url(#gs)">
      <rect x="-1.5" y="-20" width="3" height="28" fill="url(#g)" rx="0.5"/>
      <path d="M-8,-10 C-8,-19 -3,-20 -3,-15 L-3,2 L-8,2Z" fill="url(#g)"/>
      <path d="M8,-10 C8,-19 3,-20 3,-15 L3,2 L8,2Z" fill="url(#g)"/>
      <ellipse cx="0" cy="-20" rx="2.2" ry="2.8" fill="url(#g)"/>
    </g>

    <!-- Bottom naga coil -->
    <g transform="translate(0,62)" opacity="0.82" filter="url(#gs)">
      <path d="M-15,0 C-15,-9 -6,-11 0,-9 C6,-11 15,-9 15,0 C15,7 8,9 0,7 C-8,9 -15,7 -15,0Z"
        fill="none" stroke="url(#sb)" stroke-width="1.6"/>
      <ellipse cx="15" cy="0" rx="4.5" ry="3.2" fill="url(#sb)" opacity="0.65"/>
      <path d="M18,-0.5 L22,-2.5 M18,0.5 L22,2.5" stroke="url(#om)" stroke-width="0.9"/>
    </g>

    <!-- Diagonal bilva leaves -->
    <g transform="translate(44,-44) rotate(45)">
      <ellipse rx="5.5" ry="10" fill="none" stroke="#66BB6A" stroke-width="1" opacity="0.7"/>
      <line x1="0" y1="-10" x2="0" y2="10" stroke="#66BB6A" stroke-width="0.6" opacity="0.58"/>
    </g>
    <g transform="translate(44,44) rotate(135)">
      <ellipse rx="5.5" ry="10" fill="none" stroke="#66BB6A" stroke-width="1" opacity="0.7"/>
      <line x1="0" y1="-10" x2="0" y2="10" stroke="#66BB6A" stroke-width="0.6" opacity="0.58"/>
    </g>
    <g transform="translate(-44,44) rotate(225)">
      <ellipse rx="5.5" ry="10" fill="none" stroke="#66BB6A" stroke-width="1" opacity="0.7"/>
      <line x1="0" y1="-10" x2="0" y2="10" stroke="#66BB6A" stroke-width="0.6" opacity="0.58"/>
    </g>
    <g transform="translate(-44,-44) rotate(315)">
      <ellipse rx="5.5" ry="10" fill="none" stroke="#66BB6A" stroke-width="1" opacity="0.7"/>
      <line x1="0" y1="-10" x2="0" y2="10" stroke="#66BB6A" stroke-width="0.6" opacity="0.58"/>
    </g>

    <!-- 16 outer dots -->
    <g fill="url(#g)" opacity="0.5">
      <circle transform="rotate(0)"    cx="0" cy="-78" r="2"/>
      <circle transform="rotate(22.5)" cx="0" cy="-78" r="2"/>
      <circle transform="rotate(45)"   cx="0" cy="-78" r="2"/>
      <circle transform="rotate(67.5)" cx="0" cy="-78" r="2"/>
      <circle transform="rotate(90)"   cx="0" cy="-78" r="2"/>
      <circle transform="rotate(112.5)"cx="0" cy="-78" r="2"/>
      <circle transform="rotate(135)"  cx="0" cy="-78" r="2"/>
      <circle transform="rotate(157.5)"cx="0" cy="-78" r="2"/>
      <circle transform="rotate(180)"  cx="0" cy="-78" r="2"/>
      <circle transform="rotate(202.5)"cx="0" cy="-78" r="2"/>
      <circle transform="rotate(225)"  cx="0" cy="-78" r="2"/>
      <circle transform="rotate(247.5)"cx="0" cy="-78" r="2"/>
      <circle transform="rotate(270)"  cx="0" cy="-78" r="2"/>
      <circle transform="rotate(292.5)"cx="0" cy="-78" r="2"/>
      <circle transform="rotate(315)"  cx="0" cy="-78" r="2"/>
      <circle transform="rotate(337.5)"cx="0" cy="-78" r="2"/>
    </g>

    <!-- Arc text: SHIVA MARG -->
    <path id="arc" d="M-72,0 A72,72 0 0,0 72,0" fill="none"/>
    <text font-family="'Cinzel', serif" font-size="9.5" fill="url(#g)" opacity="0.7" letter-spacing="5.5">
      <textPath href="#arc" startOffset="10%">SHIVA MARG</textPath>
    </text>

  </g>

  <!-- Frame -->
  <rect x="4" y="4" width="192" height="192" fill="none" stroke="url(#g)" stroke-width="1" opacity="0.35" rx="18"/>

  <!-- Corner ornaments -->
  <g fill="none" stroke="url(#g)" stroke-width="1.2" opacity="0.5">
    <path d="M16,30 L16,16 L30,16"/><circle cx="16" cy="16" r="2.5" fill="url(#g)" stroke="none"/>
    <path d="M184,30 L184,16 L170,16"/><circle cx="184" cy="16" r="2.5" fill="url(#g)" stroke="none"/>
    <path d="M16,170 L16,184 L30,184"/><circle cx="16" cy="184" r="2.5" fill="url(#g)" stroke="none"/>
    <path d="M184,170 L184,184 L170,184"/><circle cx="184" cy="184" r="2.5" fill="url(#g)" stroke="none"/>
  </g>

</svg>
